<!DOCTYPE html>
<html>
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f19">
  
<title>AI YouTube Thumbnail Prompt Generator | Create Viral High-CTR Thumbnail Ideas</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* 🔥 LOCK SCREEN */
html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

/* FULL SCREEN CENTER */
.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* HEADER */
header{
  position:absolute;
  top:0;
  width:100%;
  text-align:left;
  padding:18px;
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(90deg,#6c5ce7,#00d2ff);
}

/* TOOL */
#prompt-optimizer-tool{
  width:100%;
  max-width:600px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.06);
}

/* TEXTAREA */
textarea{
  width:100%;
  height:120px;
  border-radius:0px;
  padding:12px;
  border:none;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  margin-top:4px;
  padding:14px;
  border:none;
  border-radius:0px;
  background:linear-gradient(90deg,#6c5ce7,#00d2ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT */
#output-area{
  margin-top:15px;
  padding:14px;
  background:rgba(0,0,0,0.4);
  border-radius:12px;
  display:none;
  white-space:pre-wrap;
  max-height:200px;
  overflow-y:auto;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:8px;
}

.footer a{
  cursor:pointer;
  margin:2 5px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
  max-height:80vh;
  overflow:auto;
  line-height:1.6;
}

.close{
  float:right;
  cursor:pointer;
  font-size:18px;
}

@media (min-width: 768px){

  header{
    font-size:34px;
    padding:30px;
  }

  /* 🔥 TOOL SIZE BIGGER ON LAPTOP */
  #prompt-optimizer-tool{
    max-width:1000px;
    padding:30px;
    border-radius:20px;
  }

  textarea{
    height:320px;
    font-size:22px;
    padding:16px;
  }

  button{
    padding:18px;
    font-size:22px;
  }

  #output-area{
    font-size:22px;
    max-height:400px;
  }

  /* 🔥 FOOTER LINKS BIGGER ONLY ON LAPTOP */
  .footer{
    font-size:18px;
    gap:15px;
  }

  .footer a{
    font-size:18px;
    font-weight:500;
  }

    /* 🔥 MODAL CONTENT (PRIVACY / TERMS PAGE INSIDE POPUP) */
  .modal-content{
    max-width:750px;
    padding:35px;
    font-size:18px;
    line-height:1.5;
  }

  .modal-content h2{
    font-size:40px;
    margin-bottom:15px;
  }

  .modal-content p{
    font-size:28px;
    margin-bottom:10px;
  }

  }

</style>

</head>

<body>

<header>
  🎯 AI YOUTUBE THUMBNAIL PROMPTS
  </header>

<div class="container">

  <div id="prompt-optimizer-tool">

    <textarea id="userInput" placeholder="Enter your prompt..."></textarea>

    <button id="genBtn" onclick="optimizePrompt()">Generate Now</button>

    <div id="output-area"></div>

  </div>

</div>

<div class="footer">
  <a data-type="privacy">Privacy Policy</a> |
  <a data-type="terms">Terms</a>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modal-text"></div>
  </div>
</div>

<script>

async function optimizePrompt(){
  const input = document.getElementById("userInput").value;
  const output = document.getElementById("output-area");
  const btn = document.getElementById("genBtn");

  if(!input){
    alert("Type something");
    return;
  }

  btn.disabled = true;

  let timeLeft = 15;
  btn.innerText = `Wait ${timeLeft}s`;

  const timer = setInterval(() => {
    timeLeft--;
    if(timeLeft > 0){
      btn.innerText = `Wait ${timeLeft}s`;
    } else {
      clearInterval(timer);
      btn.disabled = false;
      btn.innerText = "Optimize Now";
    }
  }, 1000);

  output.style.display="block";
  output.innerText="Loading...";

  try{
    const res = await fetch("https://yt-thumbnail-prompt-generator.naqvizada898.workers.dev", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ input })
    });

    const data = await res.json();
    output.innerText = data.output || "Error";

  } catch(e){
    output.innerText="Error: "+e.message+". Please try again.";
  }
}

/* MODAL CONTENT (UPDATED) */
function openModal(type){
  const modal = document.getElementById("modal");
  const text = document.getElementById("modal-text");

  if(type==="privacy"){
    text.innerHTML = `
      <h2>Privacy Policy</h2><br>

      <p><b>1. Information</b><br>
      This website does not collect personal data from users.</p><br>

      <p><b>2. Usage</b><br>
      All inputs are used only to generate AI responses.</p><br>

      <p><b>3. Third Party</b><br>
      External API services may process inputs temporarily.</p><br>

      <p><b>4. Cookies</b><br>
      Basic cookies may be used for performance improvement.</p><br>

      <p><b>5. Security</b><br>
      We follow standard practices to keep the service safe.</p>
    `;
  }

  if(type==="terms"){
    text.innerHTML = `
      <h2>Terms of Service</h2><br>

      <p><b>1. Service Use</b><br>
      This tool is provided for generating AI-based content.</p><br>

      <p><b>2. Responsibility</b><br>
      Users are responsible for how they use generated results.</p><br>

      <p><b>3. Access</b><br>
      Service may be updated or modified anytime.</p><br>

      <p><b>4. Content</b><br>
      Generated outputs belong to the user after creation.</p><br>

      <p><b>5. Availability</b><br>
      Service may occasionally be unavailable due to maintenance.</p>
    `;
  }

  modal.style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.addEventListener("click", function(e){
  if(e.target.dataset.type){
    openModal(e.target.dataset.type);
  }
});

  </script>

</body>
</html>
